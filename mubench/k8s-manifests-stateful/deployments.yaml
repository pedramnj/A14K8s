# ──────────────────────────────────────────────────────────────────────────────
# session-cache Deployment for the Phase-I stateful workload.
#
# Annotations:
#   ai4k8s.io/state-management = stateful
#     → llm_autoscaling_advisor._detect_state_management() picks this up
#       as a high-confidence stateful signal; the resulting state_note
#       contains "state is stored inside the pod" which the VPA
#       auto-route at lines 766-773 looks for.
#   autosage.ai4k8s/monitor = true
#     → AutoSage monitoring loop watches this deployment.
#   ai4k8s.io/predictive-autoscaling-enabled = true
#     → eligible for predictive autoscaling decisions.
#
# Container: python:3.11-slim running the session-cache script mounted
# from the ConfigMap. No image build needed.
# ──────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-cache
  namespace: default
  labels:
    app: session-cache
    app.kubernetes.io/part-of: mubench-stateful
    managed-by: ai4k8s
  annotations:
    ai4k8s.io/state-management: "stateful"
    ai4k8s.io/predictive-autoscaling-enabled: "true"
    autosage.ai4k8s/monitor: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: session-cache
  template:
    metadata:
      labels:
        app: session-cache
        app.kubernetes.io/part-of: mubench-stateful
      annotations:
        ai4k8s.io/state-management: "stateful"
    spec:
      containers:
      - name: session-cache
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command: ["python3", "/app/session_cache.py"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SESSION_CACHE_PORT
          value: "8080"
        - name: SESSION_BLOB_BYTES
          value: "8192"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        volumeMounts:
        - name: code
          mountPath: /app/session_cache.py
          subPath: session_cache.py
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: code
        configMap:
          name: session-cache-code
          items:
          - key: session_cache.py
            path: session_cache.py
