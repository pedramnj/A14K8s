# ──────────────────────────────────────────────────────────────────────────────
# compute Deployment for the Phase-J multiclass workload.
#
# Annotations:
#   ai4k8s.io/state-management = stateless
#     → advisor's state detector classifies this as stateless; the
#       VPA auto-route at advisor:804 will NOT fire just on state alone.
#   ai4k8s.io/predictive-autoscaling-enabled = true
#     → eligible for AutoSage decisions.
#   autosage.ai4k8s/monitor = true
#     → AutoSage monitoring loop watches this deployment.
#
# Container: python:3.11-slim with numpy installed via initContainer
# (matches the muBench CPU-chain pattern). Compute script mounted from
# the ConfigMap. No image build needed.
#
# COMPUTE_WORK_MULTIPLIER calibrated on CrownLabs's 4-vCPU x86 so that
# size=50 sits comfortably under 500ms SLA and size=150 crosses it.
# ──────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute
  namespace: default
  labels:
    app: compute
    app.kubernetes.io/part-of: mubench-multiclass
    managed-by: ai4k8s
  annotations:
    ai4k8s.io/state-management: "stateless"
    ai4k8s.io/predictive-autoscaling-enabled: "true"
    autosage.ai4k8s/monitor: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compute
  template:
    metadata:
      labels:
        app: compute
        app.kubernetes.io/part-of: mubench-multiclass
      annotations:
        ai4k8s.io/state-management: "stateless"
    spec:
      initContainers:
      - name: install-numpy
        image: python:3.11-slim
        command: ["pip", "install", "--quiet", "--target", "/extra-pkgs", "numpy"]
        volumeMounts:
        - name: extra-pkgs
          mountPath: /extra-pkgs
      containers:
      - name: compute
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command: ["python3", "/app/compute_service.py"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: COMPUTE_SERVICE_PORT
          value: "8080"
        - name: COMPUTE_DEFAULT_SIZE
          value: "50"
        - name: COMPUTE_MAX_SIZE
          value: "256"
        - name: COMPUTE_WORK_MULTIPLIER
          value: "4"
        - name: PYTHONPATH
          value: "/extra-pkgs"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        volumeMounts:
        - name: code
          mountPath: /app/compute_service.py
          subPath: compute_service.py
        - name: extra-pkgs
          mountPath: /extra-pkgs
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: code
        configMap:
          name: compute-code
          items:
          - key: compute_service.py
            path: compute_service.py
      - name: extra-pkgs
        emptyDir: {}
