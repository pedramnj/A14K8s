---
# HPA for analyze — tightest CPU limit (300m), will saturate first
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analyze
  namespace: default
  labels:
    app.kubernetes.io/part-of: mubench
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analyze
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
