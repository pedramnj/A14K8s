---
# HPA for ingest — capped at 4 to leave RAM headroom for Qwen3.5-2B (3.8 GiB)
# 3 services × 4 replicas × ~130 MiB = ~1.6 GiB; total fits in 7.2 GiB with Qwen
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingest
  namespace: default
  labels:
    app.kubernetes.io/part-of: mubench
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingest
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
# HPA for process
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
