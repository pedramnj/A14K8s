---
# ── memcached-rate ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memcached-rate
  namespace: default
  labels:
    io.kompose.service: memcached-rate
    app.kubernetes.io/part-of: dsb-hotel
    managed-by: ai4k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: memcached-rate
  template:
    metadata:
      labels:
        io.kompose.service: memcached-rate
        app.kubernetes.io/part-of: dsb-hotel
    spec:
      containers:
      - name: hotel-reserv-rate-mmc
        image: memcached:1.6-alpine
        ports:
        - containerPort: 11211
        env:
        - name: MEMCACHED_CACHE_SIZE
          value: "128"
        - name: MEMCACHED_THREADS
          value: "2"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "192Mi"
      restartPolicy: Always

---
