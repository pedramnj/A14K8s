# ─────────────────────────────────────────────────────────────────────────────
# DeathStarBench Hotel Reservation — Deployments (Phase R substrate)
#
# Adapted from upstream commit 6ecb09706140f8730b5385c08f1386c654c3c526
# (https://github.com/delimitrou/DeathStarBench/tree/master/hotelReservation/
#  kubernetes). See dsb-hotel/UPSTREAM.md for the full modification log.
#
# Pod inventory (11 total):
#   1x consul                        — service discovery
#   3x mongodb-{geo,rate,profile}    — per-service persistent stores
#   2x memcached-{rate,profile}      — per-service caches (geo has none upstream)
#   5x {frontend,search,geo,rate,profile}
#                                    — DSB Go app services (autoscaled)
#
# Only the 5 app services carry the `autosage.ai4k8s/monitor: "true"`
# annotation — backing stores are fixed infrastructure, not scaled.
# ─────────────────────────────────────────────────────────────────────────────

---
# ── consul ────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: default
  labels:
    io.kompose.service: consul
    app.kubernetes.io/part-of: dsb-hotel
    managed-by: ai4k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: consul
  template:
    metadata:
      labels:
        io.kompose.service: consul
        app.kubernetes.io/part-of: dsb-hotel
    spec:
      containers:
      - name: consul
        image: hashicorp/consul:1.15
        ports:
        - containerPort: 8300
        - containerPort: 8400
        - containerPort: 8500
        - containerPort: 53
          protocol: UDP
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
      restartPolicy: Always

---
# ── mongodb-geo ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-geo
  namespace: default
  labels:
    io.kompose.service: mongodb-geo
    app.kubernetes.io/part-of: dsb-hotel
    managed-by: ai4k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mongodb-geo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: mongodb-geo
        app.kubernetes.io/part-of: dsb-hotel
    spec:
      containers:
      - name: hotel-reserv-geo-mongo
        image: mongo:4.4.6
        ports:
        - containerPort: 27017
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: data
          mountPath: /data/db
      volumes:
      - name: data
        emptyDir: {}
      restartPolicy: Always

---
