# ─────────────────────────────────────────────────────────────────────────────
# DeathStarBench Hotel Reservation — HPAs for the 5 app services.
#
# Only frontend, search, geo, rate, profile are autoscaled. Backing stores
# (Mongo / memcached / Consul) stay at replica=1 as fixed infrastructure.
#
# min=2 / max=4 / cpu target=70 % — same envelope as the mubench harness so
# the HPA-vs-VPA-vs-AutoSage comparison uses identical baseline parameters
# across substrates.
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: default
  labels:
    app.kubernetes.io/part-of: dsb-hotel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

