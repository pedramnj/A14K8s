# ─────────────────────────────────────────────────────────────────────────────
# DeathStarBench Hotel Reservation — Services (Phase R substrate)
#
# Adapted from upstream (see dsb-hotel/UPSTREAM.md). One ClusterIP Service
# per Deployment. Names must match config.json's DNS references exactly
# (consul:8500, mongodb-geo:27017, memcached-rate:11211, etc.).
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Service
metadata:
  name: consul
  namespace: default
  labels:
    io.kompose.service: consul
    app.kubernetes.io/part-of: dsb-hotel
spec:
  selector:
    io.kompose.service: consul
  ports:
  - name: "8300"
    port: 8300
    targetPort: 8300
  - name: "8400"
    port: 8400
    targetPort: 8400
  - name: "8500"
    port: 8500
    targetPort: 8500
  - name: "8600"
    port: 8600
    protocol: UDP
    targetPort: 53

